<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard - zat.am</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <div class="dashboard-page">
      <h1>Dashboard</h1>

      <div class="user-info">
        <h2>Welcome, <span id="user-name">User</span>!</h2>
        <p id="user-email">email@example.com</p>
      </div>

      <hr />

      <div class="change-password">
        <h3>Change Password</h3>
        <form id="change-password-form">
          <input
            type="password"
            id="current-password"
            placeholder="Current Password"
            required
          />
          <input
            type="password"
            id="new-password"
            placeholder="New Password"
            required
          />
          <input
            type="password"
            id="confirm-new-password"
            placeholder="Confirm New Password"
            required
          />
          <button type="submit">Change Password</button>
        </form>
        <div id="password-message"></div>
      </div>

      <hr />

      <div class="language-settings">
        <h3>Language &amp; Script</h3>
        <label for="language-select">Preferred script for Sanskrit:</label>
        <select id="language-select">
          <option value="sa">Sanskrit – Devanagari (default)</option>
          <option value="en">Sanskrit – Latin letters (Harvard-Kyoto)</option>
        </select>
        <br /><br />
        <label>
          <input type="checkbox" id="bilingual-toggle" />
          Use my script preference in games
        </label>
        <div id="language-message"></div>
      </div>

      <hr />

      <button id="logout-btn">Logout</button>
      <br /><br />
      <a href="../index24.html">← Back to Games</a>
    </div>

    <script type="module" src="./js/dashboard.js"></script>
  </body>
</html>
