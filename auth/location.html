<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Select Location - zat.am</title>
  <link rel="stylesheet" href="./css/style.css" />
  <link rel="stylesheet" href="./css/location.css" />
</head>
<body>
  <div class="container">
    <div class="form-box">
      <h2>Select Your Location</h2>
      <div class="header-divider"></div>

      <form id="location-form">
        <div class="form-group">
          <label for="country">Choose Your Country</label>
          <select id="country" class="form-input" required>
            <option value="" disabled selected>Select Country</option>
            <option value="usa">United States</option>
            <option value="canada">Canada</option>
            <option value="other">Other</option>
          </select>
        </div>

        <div class="form-group hidden" id="province-group">
          <label for="province">Select Province / State</label>
          <select id="province" class="form-input">
            <!-- Options will be filled by JS -->
          </select>
        </div>

        <div class="form-group hidden" id="other-country-group">
          <label for="other-country">Enter Your Country</label>
          <input type="text" id="other-country" class="form-input" placeholder="Type your country name">
        </div>

        <div class="button-group">
          <button type="submit" class="btn btn-primary">Continue</button>
          <button type="button" class="btn btn-secondary" id="skip-btn">Skip for Now</button>
        </div>
      </form>

      <div id="message"></div>
    </div>
  </div>

  <script type="module" src="./js/location.js"></script>
</body>
</html>
