<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>शत.म् zat.am</title>
    <!-- font-awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.14.0/css/all.min.css"
    />
    <!-- styles -->
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="auth-buttons">
      <img src="शत.म्.png" alt="Logo" class="logo" />

      <!-- Show when logged out -->
      <div class="auth-btn">
        <span id="logged-out">
          <button onclick="window.location.href = '/auth/login.html'">
            Login
          </button>

          <button onclick="window.location.href = '/auth/signup.html'">
            Sign Up
          </button>
        </span>

        <!-- Show when logged in -->
        <div id="logged-in" class="hidden profile-container">
          <!-- Profile Icon -->
          <span id="profile-btn"
            ><i class="fas fa-user-circle fa-2x profile-icon"></i
          ></span>

          <!-- Quick language controls (for testing) -->
          <div class="lang-toggle">
            <select id="header-language-select">
              <option value="sa">देव (sa)</option>
              <option value="en">Latin (en)</option>
            </select>
            <label class="lang-toggle-label">
              <input type="checkbox" id="header-bilingual-toggle" />
              Bilingual
            </label>
          </div>

          <!-- Dropdown Menu -->
          <div id="profile-dropdown" class="dropdown hidden">
            <div class="dropdown-header">
              <p class="user-email" id="user-email-dropdown">
                user@example.com
              </p>
              <span><i class="fas fa-user-circle fa-3x profile-icon"></i></span>
              <span id="username">Hi, username!</span>
            </div>
            <hr />
            <!-- Optional duplicate controls inside dropdown for easy access -->
            <div class="dropdown-lang-settings">
              <label for="dropdown-language-select">Script:</label>
              <select id="dropdown-language-select">
                <option value="sa">देव (sa)</option>
                <option value="en">Latin (en)</option>
              </select>
              <label>
                <input type="checkbox" id="dropdown-bilingual-toggle" />
                Bilingual
              </label>
            </div>
            <hr />
            <a href="#">Leaderboard</a>
            <a href="/auth/dashboard.html">Dashboard</a>
            <a href="#">Change Password</a>
            <a href="#" id="dropdown-logout">Logout</a>
          </div>
        </div>
      </div>
    </div>
    <section class="menu">
      <!-- <h1>Hi2</h1> -->
      <!-- title -->
      <div class="title">
        <h2
          data-sanskrit="saMskRtabhAratI"
        >
          संस्कृतभारती
          <!--जयतु संस्कृतम् ।  -->
        </h2>
        <!--<h2><span style="color:red">श</span><span style="color:yellow">त</span>.<span style="color:blue">म्</span></h2>-->
        <div class="underline"></div>
      </div>
      <div class="title-demo">
        <p
          data-sanskrit="dharmakSetre kurukSetre"
        >
          धर्मक्षेत्रे कुरुक्षेत्रे
        </p>
        <p
          data-sanskrit="yogakSemam vahAmyaham"
        >
          योगक्षेमं वहाम्यहम्
        </p>
        <p
          data-sanskrit="sarveSAM maGgalaM bhUyAt"
        >
          सर्वेषां मङ्गलं भूयात्
        </p>
      </div>
      <!-- filter buttons -->
      <div class="btn-container">
        <!-- <button type="button" class="filter-btn" data-id="all">all</button>
        <button type="button" class="filter-btn" data-id="breakfast">
          breakfast
        </button>
        <button type="button" class="filter-btn" data-id="lunch">lunch</button>
        <button type="button" class="filter-btn" data-id="shakes">
          shakes
        </button> -->
      </div>
      <!-- menu items -->
      <div class="section-center"></div>
    </section>
    <footer style="text-align: center; padding: 20px">
      <a href="/legal/privacy.html" target="_blank">Privacy Policy</a>
    </footer>
    <!-- javascript -->
    <script src="app.js"></script>
    <script type="module" src="/js/navbar-auth.js"></script>
    <script type="module">
      import { applyUserLanguageToPage } from "/auth/api/lang-settings.js";

      // Apply the current user's language/script preference to any
      // elements on this page marked with data-sanskrit.
      applyUserLanguageToPage().catch((err) => {
        console.error("Failed to apply language settings on index24", err);
      });
    </script>
  </body>
</html>
